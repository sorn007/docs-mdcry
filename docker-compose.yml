services:
  mdcry:
    image: ${GHCR_IMAGE:-ghcr.io/OWNER/REPO}:${GHCR_TAG:-latest}
    container_name: mdcry
    restart: unless-stopped

    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://mdcry:mdcry@postgres:5432/mdcry}

volumes:
  pgdata:
